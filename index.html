<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teachable Machine — Classificador de Imagens</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    :root {
      --brand: #4f46e5;
      --brand-light: #eef2ff;
      --brand-hover: #4338ca;
    }

    body {
      background: #f8f9fb;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .hero-header {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      color: #fff;
      padding: 2.5rem 1rem 2rem;
      text-align: center;
    }

    .hero-header h1 {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .hero-header p {
      opacity: .82;
      font-size: .95rem;
      margin-bottom: 0;
    }

    .card-main {
      background: #fff;
      border-radius: 1.25rem;
      box-shadow: 0 4px 24px rgba(79,70,229,.08);
      overflow: hidden;
    }

    /* ── Botão de início ── */
    #btn-start {
      background: var(--brand);
      border: none;
      border-radius: .75rem;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      padding: .75rem 2rem;
      transition: background .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 4px 16px rgba(79,70,229,.35);
    }

    #btn-start:hover:not(:disabled) {
      background: var(--brand-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(79,70,229,.4);
    }

    #btn-start:active:not(:disabled) {
      transform: translateY(0);
    }

    #btn-start:disabled {
      background: #a5b4fc;
      box-shadow: none;
      cursor: not-allowed;
    }

    #btn-start .spinner-border {
      width: 1.1rem;
      height: 1.1rem;
      border-width: 2px;
    }

    /* ── Webcam ── */
    #webcam-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f0f1a;
      border-radius: 1rem;
      overflow: hidden;
      min-height: 220px;
      position: relative;
    }

    #webcam-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .5rem;
      color: #6b7280;
    }

    #webcam-placeholder i {
      font-size: 2.5rem;
      color: #9ca3af;
    }

    #webcam-container canvas {
      border-radius: .75rem;
      max-width: 100%;
      display: block;
    }

    /* ── Barras de predição ── */
    .prediction-item {
      margin-bottom: 1rem;
    }

    .prediction-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: .3rem;
      font-size: .875rem;
      font-weight: 500;
      color: #374151;
    }

    .prediction-pct {
      font-weight: 700;
      color: var(--brand);
      min-width: 3rem;
      text-align: right;
    }

    .progress {
      height: 12px;
      border-radius: 99px;
      background: #e5e7eb;
    }

    .progress-bar {
      border-radius: 99px;
      transition: width .35s ease;
    }

    .bar-high   { background: linear-gradient(90deg, #4f46e5, #7c3aed); }
    .bar-mid    { background: linear-gradient(90deg, #06b6d4, #3b82f6); }
    .bar-low    { background: linear-gradient(90deg, #a3a3a3, #6b7280); }

    /* ── Status badge ── */
    #status-badge {
      font-size: .78rem;
      padding: .35rem .75rem;
      border-radius: 99px;
      font-weight: 600;
    }

    .status-idle    { background: #f3f4f6; color: #6b7280; }
    .status-loading { background: #ede9fe; color: #6d28d9; }
    .status-active  { background: #d1fae5; color: #065f46; }

    /* ── Seção de resultados ── */
    #results-section {
      display: none;
    }
  </style>
</head>
<body>

  <!-- Cabeçalho -->
  <div class="hero-header mb-4">
    <div class="mb-2">
      <i class="bi bi-cpu-fill fs-2"></i>
    </div>
    <h1>Teachable Machine</h1>
    <p>Classificação de imagens em tempo real com sua câmera</p>
  </div>

  <div class="container pb-5" style="max-width: 680px;">
    <div class="card-main p-3 p-md-4">

      <!-- Status + botão -->
      <div class="d-flex flex-column flex-sm-row align-items-center justify-content-between gap-3 mb-4">
        <div>
          <h5 class="mb-1 fw-semibold" style="color:#111827;">Classificador ao Vivo</h5>
          <span id="status-badge" class="status-idle">
            <i class="bi bi-circle-fill me-1" style="font-size:.6rem;"></i>Aguardando início
          </span>
        </div>
        <button id="btn-start" onclick="init()">
          <i class="bi bi-camera-video-fill me-2"></i>Ativar Câmera
        </button>
      </div>

      <!-- Webcam -->
      <div id="webcam-wrapper" class="mb-4">
        <div id="webcam-placeholder">
          <i class="bi bi-camera-video-off"></i>
          <small>A câmera aparecerá aqui após ativar</small>
        </div>
        <div id="webcam-container"></div>
      </div>

      <!-- Resultados -->
      <div id="results-section">
        <hr class="my-3" style="border-color:#e5e7eb;" />
        <h6 class="fw-semibold mb-3" style="color:#374151;">
          <i class="bi bi-bar-chart-fill me-2" style="color:var(--brand);"></i>Probabilidades por Classe
        </h6>
        <div id="label-container"></div>
      </div>

    </div>

    <p class="text-center mt-3" style="font-size:.78rem; color:#9ca3af;">
      Modelo hospedado no Teachable Machine &middot; TensorFlow.js
    </p>
  </div>

  <!-- Scripts TF + TM -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const URL = "https://teachablemachine.withgoogle.com/models/pv31UzEDs/";
    let model, webcam, labelContainer, maxPredictions;
    let started = false;

    const btn        = document.getElementById('btn-start');
    const badge      = document.getElementById('status-badge');
    const placeholder = document.getElementById('webcam-placeholder');
    const resultsSection = document.getElementById('results-section');

    function setStatus(state) {
      badge.className = '';
      if (state === 'loading') {
        badge.className = 'status-loading';
        badge.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Carregando modelo…';
      } else if (state === 'active') {
        badge.className = 'status-active';
        badge.innerHTML = '<i class="bi bi-circle-fill me-1" style="font-size:.6rem;"></i>Câmera ativa';
      } else {
        badge.className = 'status-idle';
        badge.innerHTML = '<i class="bi bi-circle-fill me-1" style="font-size:.6rem;"></i>Aguardando início';
      }
    }

    function barClass(prob) {
      if (prob >= 0.6) return 'bar-high';
      if (prob >= 0.3) return 'bar-mid';
      return 'bar-low';
    }

    async function init() {
      if (started) return;
      started = true;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Carregando…';
      setStatus('loading');

      try {
        const modelURL    = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const flip = true;
        webcam = new tmImage.Webcam(320, 320, flip);
        await webcam.setup();
        await webcam.play();
        window.requestAnimationFrame(loop);

        placeholder.style.display = 'none';
        document.getElementById("webcam-container").appendChild(webcam.canvas);

        // Cria os itens de predição
        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = '';
        for (let i = 0; i < maxPredictions; i++) {
          const item = document.createElement('div');
          item.className = 'prediction-item';
          item.innerHTML = `
            <div class="prediction-label">
              <span class="class-name">Classe ${i + 1}</span>
              <span class="prediction-pct">0%</span>
            </div>
            <div class="progress">
              <div class="progress-bar bar-low" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
            </div>`;
          labelContainer.appendChild(item);
        }

        resultsSection.style.display = 'block';
        btn.innerHTML = '<i class="bi bi-camera-video-fill me-2"></i>Câmera Ativa';
        setStatus('active');

      } catch (err) {
        console.error(err);
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-camera-video-fill me-2"></i>Ativar Câmera';
        setStatus('idle');
        started = false;
        alert('Erro ao acessar a câmera ou carregar o modelo. Verifique as permissões e tente novamente.');
      }
    }

    async function loop() {
      webcam.update();
      await predict();
      window.requestAnimationFrame(loop);
    }

    async function predict() {
      const prediction = await model.predict(webcam.canvas);
      const items = labelContainer.querySelectorAll('.prediction-item');

      for (let i = 0; i < maxPredictions; i++) {
        const prob = prediction[i].probability;
        const pct  = Math.round(prob * 100);
        const name = prediction[i].className;

        const nameEl  = items[i].querySelector('.class-name');
        const pctEl   = items[i].querySelector('.prediction-pct');
        const barEl   = items[i].querySelector('.progress-bar');

        nameEl.textContent  = name;
        pctEl.textContent   = pct + '%';
        barEl.style.width   = pct + '%';
        barEl.setAttribute('aria-valuenow', pct);

        barEl.className = 'progress-bar ' + barClass(prob);
      }
    }
  </script>
</body>
</html>
